name: Feature request
description: Suggest a new feature or improvement for the SDK
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the use case first and proposed API second.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do? Why is the current SDK making it hard?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might this work? Include API sketch, config options, or examples if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
